version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      vscode:
        patterns:
          - "@vscode/*"
          - "vscode"
      all:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    cooldown:
      default-days: 7
